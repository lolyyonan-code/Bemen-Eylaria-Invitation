<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف بيمن وايلاريا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Reem+Kufi&display=swap');

        :root {
            --primary-pink: #f8d7da;
            --accent-pink: #e4a1a1;
            --text-color: #5d4037;
        }

        body, html { margin: 0; padding: 0; overflow-x: hidden; font-family: 'Amiri', serif; background: #fffcfc; }

        /* الشاشة الافتتاحية */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .split-left, .split-right {
            position: absolute;
            top: 0; width: 50.5%; height: 100%;
            background: white;
            transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .split-left { left: 0; border-right: 1px solid var(--primary-pink); }
        .split-right { right: 0; border-left: 1px solid var(--primary-pink); }

        .open-btn {
            z-index: 1001;
            padding: 15px 45px;
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.4rem;
            box-shadow: 0 10px 25px rgba(228, 161, 161, 0.4);
            font-family: 'Reem Kufi', sans-serif;
            transition: 0.3s;
        }

        /* الورد المتساقط */
        .flower { position: fixed; top: -10%; z-index: 999; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* المحتوى الرئيسي */
        .main-content {
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            transition: 2s;
            visibility: hidden;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            border: 1px solid var(--primary-pink);
        }

        .names { font-family: 'Reem Kufi', sans-serif; font-size: 2.8rem; color: var(--accent-pink); margin: 20px 0; }

        .countdown { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .time-unit { background: var(--primary-pink); padding: 12px; border-radius: 15px; min-width: 65px; }
        .time-unit span { display: block; font-size: 1.6rem; font-weight: bold; color: var(--text-color); }

        /* حالة الفتح */
        .opened .split-left { transform: translateX(-100%); }
        .opened .split-right { transform: translateX(100%); }
        .opened .main-content { opacity: 1; visibility: visible; }
        .opened .open-btn { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/kuz9n0.mp3" type="audio/mpeg">
    </audio>

    <div id="splash-screen">
        <div class="split-left"></div>
        <div class="split-right"></div>
        <button class="open-btn" onclick="openInvitation()">دعوة من القلب.. افتحيها 🌸</button>
    </div>

    <div class="main-content">
        <div class="container">
            <p style="color: var(--accent-pink); font-size: 1.2rem;">"فَالَّذِي جَمَعَهُ اللهُ لَا يُفَرِّقُهُ إِنْسَانٌ"</p>
            
            <h2 style="font-weight: normal; margin-top: 30px;">فرحة العمر</h2>
            <div class="names">بيمن & ايلاريا</div>

            <div style="line-height: 1.8; font-size: 1.2rem;">
                <p>الخميس 17 سبتمبر 2026</p>
                <p>الساعة 8:00 مساءً</p>
                <p>📍 <b>الإكليل:</b> كنيسة رئيس الملائكة ميخائيل</p>
                <p>🏨 <b>السهرة:</b> قاعة رويال بلازا</p>
            </div>

            <div id="timer" class="countdown">
                <div class="time-unit"><span id="days">0</span>يوم</div>
                <div class="time-unit"><span id="hours">0</span>ساعة</div>
                <div class="time-unit"><span id="minutes">0</span>دقيقة</div>
            </div>

            <p style="color: var(--accent-pink); font-size: 1.3rem;">حضوركم يتمم فرحتنا ✨</p>
        </div>
    </div>

    <script>
        function openInvitation() {
            document.body.classList.add('opened');
            const audio = document.getElementById('bgMusic');
            audio.play().catch(e => console.log("الموسيقى جاهزة عند التفاعل"));
            
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
            }, 1200);
        }

        // تساقط الورد
        function createFlower() {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            const flowers = ['🌸', '🌷', '🤍'];
            flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 3 + 3 + 's';
            flower.style.fontSize = Math.random() * 10 + 15 + 'px';
            document.body.appendChild(flower);
            setTimeout(() => flower.remove(), 6000);
        }
        setInterval(createFlower, 400);

        // العد التنازلي
        const weddingDate = new Date("Sept 17, 2026 20:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            if (distance > 0) {
                document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("minutes").innerHTML = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            }
        }, 1000);
    </script>
</body>
</html>
