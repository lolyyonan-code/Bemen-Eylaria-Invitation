<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دعوة فرح</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&family=Amiri&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Cairo', sans-serif;
background:#fff;
overflow:hidden;
}

/* شاشة البداية */
#startScreen {
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

button {
padding:15px 40px;
font-size:20px;
border:none;
background:pink;
color:white;
border-radius:30px;
cursor:pointer;
}

/* ورود نازلة */
.flower {
position:absolute;
top:-50px;
color:pink;
animation:fall 6s linear infinite;
}

@keyframes fall {
to { transform:translateY(110vh); }
}

/* الدعوة */
#invitation {
display:none;
text-align:center;
padding:30px;
}

.card {
background:linear-gradient(white,#ffe6f0);
margin:50px auto;
width:85%;
max-width:500px;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
animation:open 1.5s ease;
}

@keyframes open {
0% {transform:scaleX(0);}
100% {transform:scaleX(1);}
}

h1 {
font-size:28px;
}

.small {
font-size:14px;
color:#333;
margin-top:10px;
}

.countdown {
font-size:12px;
margin-top:10px;
color:#555;
}
</style>
</head>

<body>

<div id="startScreen">
<h2>💌 عندك دعوة</h2>
<button onclick="openInvite()">OPEN</button>
</div>

<div id="invitation">

<div class="card">

<h1>بيمن ♥ إيلاريا</h1>

<p class="small">
يوم الخميس 17/9/2026 الساعة 8 مساءً
</p>

<p>
الكنيسة: <a href="https://maps.app.goo.gl/dkr25pM3ahtUpcbQ9" target="_blank">رئيس الملائكة ميخائيل</a>
</p>

<p>
القاعة: <a href="https://maps.app.goo.gl/PeWPoRHqrrmeuEEKA" target="_blank">رويال بلازا</a>
</p>

<p style="font-family:'Amiri'; font-size:18px; margin-top:20px;">
"فَالَّذِي جَمَعَهُ اللهُ لَا يُفَرِّقُهُ إِنْسَانٌ"
<br>
(مت 19: 5-6)
</p>

<div class="countdown" id="countdown"></div>

</div>

</div>

<audio id="song" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<script>

// فتح الدعوة
function openInvite(){
document.getElementById('startScreen').style.display='none';
document.getElementById('invitation').style.display='block';
document.getElementById('song').play();
startFlowers();
}

// ورود نازلة
function startFlowers(){
setInterval(()=>{
let f=document.createElement('div');
f.className='flower';
f.innerHTML='🌸';
f.style.left=Math.random()*100+'vw';
document.body.appendChild(f);
setTimeout(()=>f.remove(),6000);
},300);
}

// عد تنازلي بسيط
let eventDate = new Date("2026-09-17T20:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = eventDate - now;

let days = Math.floor(diff/(1000*60*60*24));
document.getElementById("countdown").innerHTML =
"باقي على الفرح: " + days + " يوم";
},1000);

</script>

</body>
</html>
